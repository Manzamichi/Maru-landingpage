<div class="page-wrapper font-poppins">
    <div class="wrapper wrapper--w780">
        <div class="card card-3">
            <div class="card-heading"></div>
            <div class="card-body">
                <h2 class="title">DEJANOS TUS DATOS</h2>
                <form method="POST">
                    <div class="input-group">
                        <input class="input--style-3" type="text" placeholder="Nombre" name="name" required>
                    </div>
                    <div class="input-group">
                        <input class="input--style-3" type="text" pattern="\d{10,10}" placeholder="Número" name="phone" required>
                    </div>
                    <div class="input-group">
                        <input class="input--style-3" type="email" placeholder="Correo Electrónico" name="email" required>
                    </div>
                    <div class="p-t-10">
                        <button class="btn btn--pill btn--green" type="submit">Enviar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
