<div class="form-section">
    <div class="green-background">
        <div class="image">
            <img class="main-image" src="/images/cropped-flexing-woman.png" alt="Mujer flexionando sus músculos">
        </div>
        <div class="form">
            <h2>DEJANOS TUS DATOS</h2>
            <form class="contact-form">
                <div class="form-group-full">
                    <label for="name">Nombre <span class="required">*Obligatorio*</span></label>
                    <input type="text" pInputText id="name" name="name" class="p-inputtext-lg">
                </div>
                <div class="form-group-row">
                    <div class="form-group">
                        <label for="phone-number">Número <span class="required">*Obligatorio*</span></label>
                        <input type="text" pInputText id="phone-number" name="phone-number" class="p-inputtext-lg">
                    </div>
                    <div class="form-group">
                        <label for="email">Correo electrónico <span class="required">*Obligatorio*</span></label>
                        <input type="email" pInputText id="email" name="email" class="p-inputtext-lg">
                    </div>
                </div>
                <button pButton type="submit" class="submit-button">Enviar</button>
            </form>
        </div>
    </div>
</div>
