<div class="results-sections">
    <div class="title">
        <h2>Transformación Real y Duradera</h2>
        <p>¡Nuestros resultados hablan por sí mismos! Todas nuestras fotos de antes y después son de clientes reales.</p>
    </div>
    <div class="results-gallery">
        <div class="result-item" *ngFor="let result of Results">
            <img [src]="result.image" [alt]="result.alt"> 
            <div class="info-card">
                <p class="result-description">{{result.description}}</p>
                <app-button [label]="'Conocer más'" [styles]="'cta-button-small'" [sectionId]="'blog-section'"></app-button>
            </div>
        </div>
    </div>
</div>
